<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket - Coin Toss</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .toss-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #coin {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #ffd700, #daa520);
            border: 4px solid #6fffe9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: #0b132b;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(111, 255, 233, 0.4);
        }
        .spinning {
            animation: flip 0.2s infinite;
        }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }
        .toss-btn-group {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="toss-container">
        <h1 class="logo-text">THE TOSS</h1>
        
        <div id="coin">?</div>
        
        <p id="toss-result-text" style="margin-bottom: 20px;">Pick Heads or Tails!</p>

        <div class="toss-btn-group" id="selection-btns">
            <button class="menu-btn" onclick="startToss('H')">HEADS</button>
            <button class="menu-btn" onclick="startToss('T')">TAILS</button>
        </div>

        <button id="next-btn" class="hidden" onclick="window.location.href='game.html'">START GAME</button>
    </div>

    <script>
        function startToss(userChoice) {
            const coin = document.getElementById("coin");
            const resultText = document.getElementById("toss-result-text");
            const nextBtn = document.getElementById("next-btn");
            const btnGroup = document.getElementById("selection-btns");

            btnGroup.classList.add("hidden");
            coin.classList.add("spinning");
            resultText.innerText = "Flipping the coin...";

            setTimeout(() => {
                coin.classList.remove("spinning");
                const options = ["H", "T"];
                const result = options[Math.floor(Math.random() * options.length)];
                coin.innerText = result;

                if (userChoice === result) {
                    resultText.innerText = "You won the toss! You are BATTING.";
                    localStorage.setItem("userRole", "BATTING");
                } else {
                    resultText.innerText = "CPU won the toss! You are BOWLING.";
                    localStorage.setItem("userRole", "BOWLING");
                }
                nextBtn.classList.remove("hidden");
            }, 2000);
        }
    </script>
</body>
</html>
