<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket - Stadium</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0b132b;
            color: #5bc0be;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        #stadium-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            justify-content: space-between;
        }
        #score-overlay {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            background: #1c2541;
            border-bottom: 3px solid #5bc0be;
        }
        .user-info, .cpu-info { text-align: center; }
        #play-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .hand-gesture img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        #controls-panel {
            padding: 20px;
            background: #1c2541;
            border-top: 3px solid #5bc0be;
        }
        .number-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .control-btn {
            padding: 15px;
            font-size: 1.5rem;
            background: #0b132b;
            color: #5bc0be;
            border: 2px solid #5bc0be;
            border-radius: 10px;
            cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="stadium-wrapper">
        <div id="score-overlay">
            <div class="user-info">
                <p>YOU</p>
                <h1 id="user-score">0</h1>
                <div id="life-icons">❤️❤️❤️</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="cpu-info">
                <p>CPU</p>
                <h1 id="cpu-score">0</h1>
            </div>
        </div>

        <div id="play-area">
            <div class="hand-gesture">
                <img id="user-hand-img" src="assets/0.png">
            </div>
            <div class="hand-gesture">
                <img id="cpu-hand-img" src="assets/0.png" style="transform: scaleX(-1);">
            </div>
        </div>

        <div id="controls-panel">
            <p id="game-status" style="text-align: center; margin-bottom: 10px;">READY?</p>
            <div class="number-buttons">
                <button class="control-btn" onclick="play(1)">1</button>
                <button class="control-btn" onclick="play(2)">2</button>
                <button class="control-btn" onclick="play(3)">3</button>
                <button class="control-btn" onclick="play(4)">4</button>
                <button class="control-btn" onclick="play(5)">5</button>
                <button class="control-btn" onclick="play(6)">6</button>
            </div>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="modal-title">OUT!</h2>
            <p id="modal-msg"></p>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
