<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket - Stadium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stadium-wrapper">
        <div id="score-overlay">
            <div class="user-info">
                <p>YOU</p>
                <h1 id="user-score">0</h1>
                <div id="life-icons">❤️❤️❤️</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="cpu-info">
                <p>CPU</p>
                <h1 id="cpu-score">0</h1>
            </div>
        </div>

        <div id="play-area">
            <div class="hand-gesture">
    <img id="user-hand-img" src="assets/6.png" style="width: 100px; height: 100px;">
</div>
...
<div class="hand-gesture">
    <img id="cpu-hand-img" src="assets/6.png" style="width: 100px; height: 100px; transform: scaleX(-1);">
</div>
            
        </div>

        <div id="controls-panel">
            <div class="number-buttons">
                <button class="control-btn" onclick="play(1)">1</button>
                <button class="control-btn" onclick="play(2)">2</button>
                <button class="control-btn" onclick="play(3)">3</button>
                <button class="control-btn" onclick="play(4)">4</button>
                <button class="control-btn" onclick="play(5)">5</button>
                <button class="control-btn" onclick="play(6)">6</button>
            </div>
        </div>
    </div>

    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="modal-title">OUT!</h2>
            <p id="modal-msg"></p>
            <button class="modal-btn">OK</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
