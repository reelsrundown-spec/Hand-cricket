<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <meta name="theme-color" content="#0b132b">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        body {
            margin: 0;
            background: #0b132b;
            color: #6fffe9;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-box {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .bar-bg {
            width: 100%;
            height: 8px;
            background: #1c2541;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: #6fffe9;
            box-shadow: 0 0 15px #6fffe9;
            transition: width 0.1s;
        }

        #start-btn {
            padding: 15px 30px;
            background: #6fffe9;
            color: #0b132b;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(111, 255, 233, 0.3);
            margin-top: 20px;
        }

        #load-txt {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="loader-box">
        <h1>Hand Cricket</h1>
        <div class="bar-bg">
            <div id="bar" class="bar-fill"></div>
        </div>
        <p id="load-txt">Loading...</p>
        <button id="start-btn" onclick="bgMusic.play(); location.href='home.html'">START GAME</button>
    </div>

    <script>
        // Service Worker രജിസ്റ്റർ ചെയ്യുന്നു (ഇൻസ്റ്റാൾ ഓപ്ഷൻ വരാൻ)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // ലോഡിംഗ് ബാർ ആനിമേഷൻ
        let w = 0;
        let int = setInterval(() => {
            w += 2;
            document.getElementById('bar').style.width = w + '%';
            if (w >= 100) {
                clearInterval(int);
                document.getElementById('load-txt').innerText = 'READY';
                document.getElementById('start-btn').style.display = 'inline-block';
            }
        }, 40);
    </script>
</body>
</html>
