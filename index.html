<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket Pro</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0b132b">
</head>
<body>

    <div class="loader-container">
        <h1 class="logo-text">HAND CRICKET</h1>
        
        <div class="progress-wrapper">
            <div id="progress-bar" class="progress-fill"></div>
        </div>
        
        <p id="status-text">INITIALIZING...</p>
        
        <button id="start-btn" class="hidden">START GAME</button>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');

        let width = 0;
        const loadingInterval = setInterval(() => {
            width += Math.floor(Math.random() * 5) + 1; // Realistic loading speed
            if (width >= 100) {
                width = 100;
                clearInterval(loadingInterval);
                statusText.innerText = "READY TO PLAY";
                startBtn.classList.remove('hidden');
            }
            progressBar.style.width = width + '%';
        }, 100);

        startBtn.onclick = () => {
            // Background music initialization can be added here later
            window.location.href = 'home.html';
        };
    </script>
</body>
</html>
