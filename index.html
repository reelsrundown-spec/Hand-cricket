<!DOCTYPE html>
<html lang="en">
<head

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket - Loading</title>
    <style>
        body {
            margin: 0;
            background: #0b132b;
            color: #6fffe9;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .loader-box { text-align: center; width: 80%; }
        .bar-bg {
            width: 100%;
            height: 8px;
            background: #1c2541;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .bar-fill {
            width: 0%;
            height: 100%;
            background: #6fffe9;
            box-shadow: 0 0 15px #6fffe9;
            transition: width 0.1s;
        }
        #start-btn {
            padding: 12px 25px;
            background: #6fffe9;
            color: #0b132b;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            cursor: pointer;
        }
    </style>
</head><link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" href="assets/logo.png">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0b132b">
<meta name="apple-mobile-web-app-capable" content="yes">
    
<body>
    <div class="loader-box">
        <h1>HAND CRICKET</h1>
        <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
        <p id="load-txt">Loading...</p>
        <button id="start-btn" onclick="location.href='home.html'">START GAME</button>
    </div>
    <script>
        let w = 0;
        let int = setInterval(() => {
            w += 2;
            document.getElementById('bar').style.width = w + '%';
            if(w >= 100) {
                clearInterval(int);
                document.getElementById('load-txt').innerText = "READY";
                document.getElementById('start-btn').style.display = "inline-block";
            }
        }, 40);
    </script>
</body>
</html>
