<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Cricket Pro</title>
    <style>
        /* ബാക്ക്ഗ്രൗണ്ട് കറുപ്പ്, എല്ലാം സെന്ററിൽ */
        body {
            margin: 0;
            background-color: #0b132b;
            color: #5bc0be;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .loader-container {
            width: 80%;
        }

        .logo-text {
            font-size: 3rem;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #5bc0be;
        }

        /* ലോഡിംഗ് ബാർ */
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: #1c2541;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: #5bc0be;
            width: 0%;
            box-shadow: 0 0 10px #5bc0be;
        }

        /* മിന്നിമറയുന്ന TAP TO START */
        .tap-msg {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            display: none; /* ലോഡിംഗ് കഴിയുമ്പോൾ മാത്രം വരും */
            animation: blink 1.2s infinite;
            cursor: pointer;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body id="main-body">

    <div class="loader-container">
        <h1 class="logo-text">HAND<br>CRICKET</h1>
        
        <div class="progress-wrapper">
            <div id="progress-bar" class="progress-fill"></div>
        </div>
        
        <p id="status">INITIALIZING...</p>
        <div id="tap-to-start" class="tap-msg">TAP TO START</div>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status');
        const tapMsg = document.getElementById('tap-to-start');
        const mainBody = document.getElementById('main-body');

        let width = 0;
        let isLoaded = false;

        // ലോഡിംഗ് സ്പീഡ്
        const interval = setInterval(() => {
            width += Math.floor(Math.random() * 5) + 2;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
                isLoaded = true;
                statusText.style.display = 'none';
                tapMsg.style.display = 'block'; // ലോഡിംഗ് കഴിഞ്ഞാൽ മെസേജ് കാണിക്കും
            }
            progressBar.style.width = width + '%';
        }, 100);

        // സ്ക്രീനിൽ എവിടെ തൊട്ടാലും ഹോം പേജിലേക്ക് പോകും
        mainBody.onclick = () => {
            if (isLoaded) {
                window.location.href = 'home.html';
            }
        };
    </script>
</body>
</html>
